name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and test .NET Backend
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore AutoResearchClaw.sln

      - name: Build
        run: dotnet build AutoResearchClaw.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AutoResearchClaw.sln --configuration Release --no-build --verbosity minimal || true

      - name: Build container images
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }} -f src/AutoResearchClaw.Api/Dockerfile .
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }} -f src/AutoResearchClaw.Worker/Dockerfile .

      - name: Push API image
        if: github.event_name == 'push'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}

      - name: Push Worker image
        if: github.event_name == 'push'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }}

  # Build Next.js Frontend
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint || true

      - name: Build
        working-directory: web
        run: npm run build

      - name: Build container image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }} -f web/Dockerfile .

      - name: Push Web image
        if: github.event_name == 'push'
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}

  # Deploy to staging (on develop branch)
  deploy-staging:
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here
          # e.g., kubectl apply -f k8s/staging/

  # Deploy to production (on main branch)
  deploy-production:
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your deployment commands here
          # e.g., kubectl apply -f k8s/production/